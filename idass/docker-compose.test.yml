services:
  postgres-test-1:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: idass
      POSTGRES_PASSWORD: idass
      POSTGRES_DB: idass_test_1
    ports: ["5434:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U idass"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-test-2:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: idass
      POSTGRES_PASSWORD: idass
      POSTGRES_DB: idass_test_2
    ports: ["5435:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U idass"]
      interval: 5s
      timeout: 5s
      retries: 5
